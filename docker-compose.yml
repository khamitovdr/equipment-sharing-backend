version: '3.8'

services:
  web:
    build: ./project
    command: uvicorn app.main:app --reload --workers 1 --host 0.0.0.0 --port 8000
    volumes:
      - ./project:/usr/src/app
    ports:
      - 8004:8000
    env_file: .env
    depends_on:
      - web-db
  web-db:
    build:
      context: ./project/db
      dockerfile: Dockerfile
    expose:
      - 5432
    ports: # For PostgreSQL Explorer
      - 54321:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    env_file: project/db/.env
volumes:
  postgres-data:
